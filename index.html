<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Diplôme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #feed {
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: contain;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #feed::-webkit-scrollbar { display: none; }
    .slide {
      height: 100dvh;
      width: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #000;
    }
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;        /* vraiment plein écran, sans bande noire */
      background: #000;
      display: block;
    }
    /* Tap de départ : obligatoire pour autoriser le son (règle navigateur) */
    #splash {
      position: fixed; inset: 0; z-index: 50;
      background: #000; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      transition: opacity .45s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .play {
      width: 84px; height: 84px;
      border: 2px solid rgba(255,255,255,.85); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite ease-in-out;
    }
    #splash .play::after {
      content: ""; width: 0; height: 0;
      border-left: 24px solid #fff;
      border-top: 15px solid transparent; border-bottom: 15px solid transparent;
      margin-left: 6px;
    }
    #splash p { font-size: 16px; opacity: .85; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.75} }
    #empty {
      position: fixed; inset: 0; z-index: 40; color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; line-height: 1.5; opacity: .85;
    }
  </style>
</head>
<body>
  <div id="feed"></div>
  <div id="splash"><div class="play"></div><p>Appuyer pour commencer</p></div>
  <div id="empty">Aucune vidéo trouvée dans <b>videos/</b>.</div>

  <script>
    const feed = document.getElementById("feed");
    const splash = document.getElementById("splash");
    const emptyMsg = document.getElementById("empty");

    let videos = [];
    let started = false;
    let current = 0;

    async function loadManifest() {
      try {
        const res = await fetch("videos.json", { cache: "no-store" });
        const list = await res.json();
        return Array.isArray(list) ? list : [];
      } catch (e) { return []; }
    }

    function buildFeed(list) {
      list.forEach((src, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        const v = document.createElement("video");
        v.dataset.src = src;
        v.dataset.index = i;
        v.loop = true;             // chaque vidéo boucle sur elle-même
        v.muted = true;
        v.playsInline = true;
        v.setAttribute("playsinline", "");
        v.setAttribute("webkit-playsinline", "");
        v.preload = "auto";
        slide.appendChild(v);
        feed.appendChild(slide);
        videos.push(v);
      });
    }

    // Ne garde chargées que la vidéo courante + les voisines.
    // Indispensable : un iPhone ne décode que quelques vidéos à la fois
    // (au-delà -> écran noir). On libère les autres.
    function setWindow(index) {
      videos.forEach((v, i) => {
        const near = Math.abs(i - index) <= 1;
        if (near && !v.src) { v.src = v.dataset.src; v.load(); }
        else if (!near && v.src) { v.removeAttribute("src"); v.load(); }
      });
    }

    function ensurePlay(v) {
      const go = () => { const p = v.play(); if (p) p.catch(() => {}); };
      if (v.readyState >= 2) go();
      else v.addEventListener("loadeddata", go, { once: true });
    }

    function setActive(index) {
      if (index === current && videos[index] && videos[index].src) return;
      current = index;
      setWindow(index);
      videos.forEach((v, i) => {
        if (i === index) {
          v.muted = !started;
          if (started) ensurePlay(v);
        } else {
          v.pause();
        }
      });
    }

    // Détecte la vidéo visible et la lance (fiable sur iOS)
    function setupObserver() {
      const io = new IntersectionObserver((entries) => {
        let best = null;
        entries.forEach((e) => {
          if (e.isIntersecting && (!best || e.intersectionRatio > best.intersectionRatio)) best = e;
        });
        if (best && best.intersectionRatio >= 0.55) {
          setActive(Number(best.target.firstChild.dataset.index));
        }
      }, { threshold: [0.55, 0.8] });
      document.querySelectorAll(".slide").forEach((s) => io.observe(s));
    }

    function start() {
      if (started) return;
      started = true;
      splash.classList.add("hide");
      setWindow(current);
      const v = videos[current];
      if (v) { v.muted = false; ensurePlay(v); }
    }
    splash.addEventListener("click", start);
    splash.addEventListener("touchend", start, { passive: true });

    (async function init() {
      const list = await loadManifest();
      if (!list.length) { splash.style.display = "none"; emptyMsg.style.display = "flex"; return; }
      buildFeed(list);
      setupObserver();
      setWindow(0);
    })();
  </script>
</body>
</html>
