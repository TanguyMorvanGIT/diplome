<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <title>Diplôme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #feed {
      position: fixed; inset: 0;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: contain;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #feed::-webkit-scrollbar { display: none; }
    .slide {
      height: 100dvh; width: 100%;
      scroll-snap-align: start; scroll-snap-stop: always;
      background: #000;
    }
    @media all and (display-mode: standalone), all and (display-mode: fullscreen) {
      #feed, .slide { height: 100vh; }
    }
    .slide video {
      width: 100%; height: 100%;
      object-fit: cover; background: #000; display: block;
    }

    #splash {
      position: fixed; inset: 0; z-index: 50;
      background: #000; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      transition: opacity .4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .play {
      width: 84px; height: 84px;
      border: 2px solid rgba(255,255,255,.85); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite ease-in-out;
    }
    #splash .play::after {
      content: ""; width: 0; height: 0;
      border-left: 24px solid #fff;
      border-top: 15px solid transparent; border-bottom: 15px solid transparent;
      margin-left: 6px;
    }
    #splash p { font-size: 16px; opacity: .85; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.75} }

    /* État chargement : on masque le bouton "play", on montre la barre */
    #splash.loading .play, #splash.loading .ready-text { display: none; }
    #splash:not(.loading) .loadwrap { display: none; }
    .loadwrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #loadbar {
      width: 200px; height: 4px; border-radius: 4px;
      background: rgba(255,255,255,.2); overflow: hidden;
    }
    #loadbar > i { display: block; height: 100%; width: 0%; background: #fff; transition: width .2s ease; }

    #empty {
      position: fixed; inset: 0; z-index: 40; color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; line-height: 1.5; opacity: .85;
    }
    /* TEMPORAIRE : bouton de mise à jour (force le rechargement sans cache) */
    #updateBtn {
      position: fixed; z-index: 60;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 50%; transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .2px;
      border: 1px solid rgba(255,255,255,.25); border-radius: 999px;
      cursor: pointer;
    }
    #updateBtn:active { background: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div id="feed"></div>
  <button id="updateBtn">↻ Mise à jour</button>

  <div id="splash" class="loading">
    <div class="play"></div>
    <p class="ready-text">Appuyer pour commencer</p>
    <div class="loadwrap">
      <div id="loadbar"><i></i></div>
      <p id="loadtext">Préparation… 0%</p>
    </div>
  </div>

  <div id="empty">Aucune vidéo trouvée dans <b>videos/</b>.</div>

  <script>
    const feed = document.getElementById("feed");
    const splash = document.getElementById("splash");
    const emptyMsg = document.getElementById("empty");
    const loadbar = document.querySelector("#loadbar > i");
    const loadtext = document.getElementById("loadtext");

    let videos = [];
    let started = false;
    let ready = false;     // true quand TOUT est téléchargé
    let current = 0;
    const WINDOW = 1;      // voisines dont on pré-décode la 1re image

    async function loadManifest() {
      try {
        const res = await fetch("videos.json", { cache: "no-store" });
        const list = await res.json();
        return Array.isArray(list) ? list : [];
      } catch (e) { return []; }
    }

    function buildFeed(list) {
      list.forEach((src, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        const v = document.createElement("video");
        v.dataset.index = i;
        v.loop = true;
        v.muted = true; v.defaultMuted = true;
        v.playsInline = true;
        v.setAttribute("playsinline", "");
        v.setAttribute("webkit-playsinline", "");
        v.setAttribute("muted", "");
        v.preload = "auto";
        slide.appendChild(v);
        feed.appendChild(slide);
        videos.push(v);
      });
    }

    // Télécharge TOUTES les vidéos en mémoire (blob) avant de commencer.
    // Une fois fait : plus aucun accès réseau, lecture instantanée toute la soirée.
    async function preloadAll(list) {
      let done = 0;
      const urls = new Array(list.length);
      await Promise.all(list.map(async (src, i) => {
        try {
          const res = await fetch(src, { cache: "force-cache" });
          const blob = await res.blob();
          urls[i] = URL.createObjectURL(blob);
        } catch (e) {
          urls[i] = src; // repli : lecture directe si le téléchargement échoue
        }
        done++;
        const pct = Math.round(done / list.length * 100);
        loadbar.style.width = pct + "%";
        loadtext.textContent = "Préparation… " + pct + "%";
      }));
      // Toutes les sources sont locales : on les assigne toutes (aucun coût réseau)
      videos.forEach((v, i) => { v.src = urls[i]; v.load(); });
    }

    // Pré-décode la 1re image (lecture muette puis pause) -> aucune "seconde de noir"
    function prime(v) {
      if (v._primed || !v.src) return;
      v._primed = true;
      v.muted = true;
      const p = v.play();
      if (p) p.then(() => { if (Number(v.dataset.index) !== current) v.pause(); })
             .catch(() => { v.addEventListener("loadeddata", () => { try { v.currentTime = 0.01; } catch (e) {} }, { once: true }); });
    }

    function ensurePlay(v) {
      const go = () => { const p = v.play(); if (p) p.catch(() => {}); };
      if (v.readyState >= 2) go();
      else v.addEventListener("loadeddata", go, { once: true });
    }

    function setActive(index) {
      const changed = index !== current;
      current = index;
      videos.forEach((v, i) => {
        if (Math.abs(i - index) <= WINDOW) prime(v);   // 1re image prête sur les voisines
        if (i === index) {
          v.muted = !started;
          if (started) ensurePlay(v);
        } else if (changed) {
          v.pause();
        }
      });
    }

    function setupObserver() {
      const io = new IntersectionObserver((entries) => {
        let best = null;
        entries.forEach((e) => {
          if (e.isIntersecting && (!best || e.intersectionRatio > best.intersectionRatio)) best = e;
        });
        if (best && best.intersectionRatio >= 0.55) {
          setActive(Number(best.target.firstChild.dataset.index));
        }
      }, { threshold: [0.55, 0.9] });
      document.querySelectorAll(".slide").forEach((s) => io.observe(s));
    }

    function start() {
      if (started || !ready) return;
      started = true;
      splash.classList.add("hide");
      const v = videos[current];
      if (v) { v.muted = false; ensurePlay(v); }
    }
    splash.addEventListener("click", start);
    splash.addEventListener("touchend", start, { passive: true });

    // TEMPORAIRE : force le rechargement de la dernière version (contourne le cache)
    document.getElementById("updateBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      if ("caches" in window) { caches.keys().then((k) => k.forEach((n) => caches.delete(n))); }
      location.replace(location.pathname + "?v=" + Date.now());
    });

    (async function init() {
      const list = await loadManifest();
      if (!list.length) { splash.style.display = "none"; emptyMsg.style.display = "flex"; return; }
      buildFeed(list);
      setupObserver();
      await preloadAll(list);     // <-- tout charger avant de pouvoir commencer
      prime(videos[0]);           // 1re image affichée derrière l'écran d'accueil
      ready = true;
      splash.classList.remove("loading");   // affiche "Appuyer pour commencer"
    })();
  </script>
</body>
</html>
