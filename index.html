<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <title>Diplôme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #ff00ff;   /* TEST diagnostic : repère la zone non couverte */
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* Ancré aux 4 bords physiques de l'écran (comme la navbar fixed bottom:0 de
       l'app gym) -> descend jusqu'au bord du bas, dans la zone de l'indicateur
       home, là où 100dvh s'arrête. C'est ça qui supprime la bande noire. */
    #feed {
      position: fixed; top: 0; left: 0; right: 0;
      height: 100vh;        /* grand viewport iOS = écran physique entier (874), pas 812 */
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #feed::-webkit-scrollbar { display: none; }
    .slide {
      position: relative;
      height: 100vh; width: 100%;
      scroll-snap-align: start; scroll-snap-stop: always;
      background: #ff00ff;   /* TEST diagnostic */
      overflow: hidden;
    }
    .slide .poster, #player {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    /* UNE seule vidéo, déplacée sur la slide active, sous la vignette */
    #player { z-index: 1; background: transparent; display: block; }
    .slide .poster {
      z-index: 2;
      background-position: center; background-size: cover; background-repeat: no-repeat;
    }
    .slide .poster.hidden { opacity: 0; }

    #splash {
      position: fixed; inset: 0; z-index: 50;
      background: #000; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      transition: opacity .4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .play {
      width: 84px; height: 84px;
      border: 2px solid rgba(255,255,255,.85); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite ease-in-out;
    }
    #splash .play::after {
      content: ""; width: 0; height: 0;
      border-left: 24px solid #fff;
      border-top: 15px solid transparent; border-bottom: 15px solid transparent;
      margin-left: 6px;
    }
    #splash p { font-size: 16px; opacity: .85; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.75} }
    #splash.loading .play, #splash.loading .ready-text { display: none; }
    #splash:not(.loading) .loadwrap { display: none; }
    .loadwrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #loadbar { width: 200px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.2); overflow: hidden; }
    #loadbar > i { display: block; height: 100%; width: 0%; background: #fff; transition: width .2s ease; }

    #empty {
      position: fixed; inset: 0; z-index: 40; color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; line-height: 1.5; opacity: .85;
    }
    /* TEMPORAIRE : bouton de mise à jour (force le rechargement sans cache) */
    #updateBtn {
      position: fixed; z-index: 60;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 50%; transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .2px;
      border: 1px solid rgba(255,255,255,.25); border-radius: 999px;
      cursor: pointer;
    }
    #updateBtn:active { background: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div id="feed"></div>
  <button id="updateBtn">↻ Mise à jour</button>
  <div id="dbg" style="position:fixed;left:8px;bottom:8px;z-index:9999;background:rgba(0,0,0,.8);color:#0f0;font:12px monospace;padding:8px;border-radius:6px;white-space:pre;pointer-events:none"></div>
  <div id="probe" style="position:fixed;bottom:0;height:env(safe-area-inset-bottom,0px);width:1px;"></div>

  <div id="splash" class="loading">
    <div class="play"></div>
    <p class="ready-text">Appuyer pour commencer</p>
    <div class="loadwrap">
      <div id="loadbar"><i></i></div>
      <p id="loadtext">Préparation… 0%</p>
    </div>
  </div>

  <div id="empty">Aucune vidéo trouvée dans <b>videos/</b>.</div>

  <script>
    // DEBUG : affiche les vraies dimensions de l'iPhone
    (function debug() {
      const d = document.getElementById("dbg");
      function up() {
        const probe = document.getElementById("probe");
        const f = document.getElementById("feed");
        const vv = window.visualViewport;
        d.textContent =
          "innerH=" + window.innerHeight +
          "\nscreenH=" + screen.height +
          "\nvisualVP=" + (vv ? Math.round(vv.height) : "?") +
          "\nsafe-bottom=" + getComputedStyle(probe).height +
          "\nfeedH=" + f.getBoundingClientRect().height +
          "\ndpr=" + window.devicePixelRatio +
          "\nstandalone=" + (navigator.standalone === true);
      }
      up(); setInterval(up, 500);
    })();

    const feed = document.getElementById("feed");
    const splash = document.getElementById("splash");
    const emptyMsg = document.getElementById("empty");
    const loadbar = document.querySelector("#loadbar > i");
    const loadtext = document.getElementById("loadtext");

    // Version des fichiers média : change cette valeur à chaque remplacement de
    // vidéos pour forcer le re-téléchargement (contourne tout cache).
    const ASSET_V = "hq1";
    function bust(u) { return u + (u.indexOf("?") >= 0 ? "&" : "?") + "av=" + ASSET_V; }

    let slides = [];         // vraies slides : { el, poster }
    let srcs = [];           // URL finale de chaque vidéo (blob si préchargée)
    let N = 0;
    let started = false;
    let ready = false;
    let current = 0;
    let teleporting = false;

    // L'UNIQUE élément vidéo, réutilisé pour tout le feed -> iOS ne peut jamais
    // dépasser sa limite (il n'y a qu'une seule vidéo en mémoire).
    const player = document.createElement("video");
    player.id = "player";
    player.loop = true;
    player.muted = true; player.defaultMuted = true;
    player.playsInline = true;
    player.preload = "auto";
    player.setAttribute("playsinline", "");
    player.setAttribute("webkit-playsinline", "");
    player.setAttribute("muted", "");

    function showCurrentPoster() { if (slides[current]) slides[current].poster.classList.remove("hidden"); }
    function hideCurrentPoster() { if (slides[current]) slides[current].poster.classList.add("hidden"); }

    // La vignette se réaffiche dès que la vidéo n'a pas d'image stable
    player.addEventListener("pause", showCurrentPoster);
    player.addEventListener("waiting", showCurrentPoster);
    player.addEventListener("seeking", showCurrentPoster);   // boucle qui repart -> pas de noir
    player.addEventListener("emptied", showCurrentPoster);
    // Cache la vignette PILE quand une vraie image est rendue
    if ("requestVideoFrameCallback" in HTMLVideoElement.prototype) {
      const onFrame = () => { if (!player.paused) hideCurrentPoster(); player.requestVideoFrameCallback(onFrame); };
      player.requestVideoFrameCallback(onFrame);
    } else {
      player.addEventListener("timeupdate", () => { if (!player.paused && player.currentTime > 0.02) hideCurrentPoster(); });
    }

    async function loadManifest() {
      try {
        const res = await fetch("videos.json", { cache: "no-store" });
        const list = await res.json();
        return Array.isArray(list) ? list : [];
      } catch (e) { return []; }
    }

    function posterUrl(src) {
      return src.replace("videos/", "posters/").replace(/_video\.mp4$/i, ".jpg");
    }
    function H() { return feed.clientHeight; }
    function makePoster(src) {
      const p = document.createElement("div");
      p.className = "poster";
      p.style.backgroundImage = "url('" + bust(posterUrl(src)) + "')";
      return p;
    }

    function buildFeed(list) {
      N = list.length;

      const topClone = document.createElement("div");
      topClone.className = "slide";
      topClone.dataset.clone = "top";
      topClone.appendChild(makePoster(list[N - 1]));
      feed.appendChild(topClone);

      list.forEach((src, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.dataset.index = i;
        const poster = makePoster(src);
        slide.appendChild(poster);
        feed.appendChild(slide);
        slides.push({ el: slide, poster: poster });
        srcs[i] = bust(src);
      });

      const botClone = document.createElement("div");
      botClone.className = "slide";
      botClone.dataset.clone = "bottom";
      botClone.appendChild(makePoster(list[0]));
      feed.appendChild(botClone);
    }

    async function preloadAll(list) {
      await Promise.all(list.map((src) => new Promise((res) => {
        const img = new Image(); img.onload = img.onerror = res; img.src = bust(posterUrl(src));
      })));
      for (let i = 0; i < list.length; i++) {
        try {
          const r = await fetch(bust(list[i]), { cache: "reload" });
          srcs[i] = URL.createObjectURL(await r.blob());
        } catch (e) {}
        const pct = Math.round((i + 1) / list.length * 100);
        loadbar.style.width = pct + "%";
        loadtext.textContent = "Préparation… " + pct + "%";
      }
    }

    function playActive() {
      player.muted = !started;
      const p = player.play();
      if (p) p.catch(() => {});
    }

    function setActive(index) {
      const slide = slides[index];
      if (!slide) return;
      if (index === current && player.parentElement === slide.el) {
        if (started && player.paused) playActive();
        return;
      }
      showCurrentPoster();                 // la slide qu'on quitte réaffiche sa vignette
      current = index;
      slide.poster.classList.remove("hidden");
      if (player.parentElement !== slide.el) slide.el.appendChild(player);
      if (player.getAttribute("src") !== srcs[index]) {
        player.src = srcs[index];
        player.load();
      }
      if (started) playActive(); else player.pause();
    }

    function goToReal(index) {
      teleporting = true;
      feed.scrollTop = (index + 1) * H();
      setActive(index);
      requestAnimationFrame(() => { teleporting = false; });
    }

    function setupObserver() {
      const io = new IntersectionObserver((entries) => {
        if (teleporting) return;
        let best = null;
        entries.forEach((e) => {
          if (e.isIntersecting && (!best || e.intersectionRatio > best.intersectionRatio)) best = e;
        });
        if (!best) return;
        const t = best.target;
        if (t.dataset.clone === "bottom" && best.intersectionRatio >= 0.9) { goToReal(0); return; }
        if (t.dataset.clone === "top" && best.intersectionRatio >= 0.9) { goToReal(N - 1); return; }
        if (t.dataset.index !== undefined && best.intersectionRatio >= 0.5) {
          setActive(Number(t.dataset.index));
        }
      }, { threshold: [0.5, 0.9, 0.99] });
      document.querySelectorAll(".slide").forEach((s) => io.observe(s));
    }

    function start() {
      if (started || !ready) return;
      started = true;
      splash.classList.add("hide");
      playActive();
    }
    splash.addEventListener("click", start);
    splash.addEventListener("touchend", start, { passive: true });

    document.getElementById("updateBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      if ("caches" in window) { caches.keys().then((k) => k.forEach((n) => caches.delete(n))); }
      location.replace(location.pathname + "?v=" + Date.now());
    });

    (async function init() {
      const list = await loadManifest();
      if (!list.length) { splash.style.display = "none"; emptyMsg.style.display = "flex"; return; }
      buildFeed(list);
      requestAnimationFrame(() => { feed.scrollTop = H(); });
      setupObserver();
      await preloadAll(list);
      setActive(0);            // place la vidéo unique sur la 1re slide (en pause)
      ready = true;
      splash.classList.remove("loading");
    })();
  </script>
</body>
</html>
