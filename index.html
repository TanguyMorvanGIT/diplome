<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Diplôme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* Conteneur de scroll vertical plein écran avec accrochage (snap) */
    #feed {
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #feed::-webkit-scrollbar { display: none; }

    .slide {
      position: relative;
      height: 100dvh;
      width: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* montre la vidéo entière, sans recadrage */
      background: #000;
    }

    /* Écran d'accueil : un seul tap pour débloquer le son */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      cursor: pointer;
      transition: opacity .5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .play {
      width: 88px; height: 88px;
      border: 2px solid rgba(255,255,255,.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite ease-in-out;
    }
    #splash .play::after {
      content: "";
      width: 0; height: 0;
      border-left: 26px solid #fff;
      border-top: 16px solid transparent;
      border-bottom: 16px solid transparent;
      margin-left: 6px;
    }
    #splash p { font-size: 17px; letter-spacing: .3px; opacity: .9; }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: .75; }
    }

    #empty {
      position: fixed; inset: 0; z-index: 40;
      color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; font-size: 16px; line-height: 1.5; opacity: .85;
    }
  </style>
</head>
<body>
  <div id="feed"></div>

  <div id="splash">
    <div class="play"></div>
    <p>Appuyer pour commencer</p>
  </div>

  <div id="empty">Aucune vidéo trouvée.<br />Ajoute des fichiers dans le dossier <b>videos/</b>.</div>

  <script>
    const feed = document.getElementById("feed");
    const splash = document.getElementById("splash");
    const emptyMsg = document.getElementById("empty");

    let videos = [];
    let started = false;
    let current = 0;

    async function loadManifest() {
      try {
        const res = await fetch("videos.json", { cache: "no-store" });
        const list = await res.json();
        return Array.isArray(list) ? list : [];
      } catch (e) {
        return [];
      }
    }

    function buildFeed(list) {
      list.forEach((src, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";

        const v = document.createElement("video");
        v.src = src;
        v.playsInline = true;
        v.setAttribute("playsinline", "");
        v.setAttribute("webkit-playsinline", "");
        v.muted = true;          // muet au départ : autorise la lecture auto
        v.preload = "auto";
        v.dataset.index = i;

        // Quand une vidéo se termine -> on passe à la suivante.
        // Après la dernière -> retour à la première (boucle infinie).
        v.addEventListener("ended", () => {
          if (Number(v.dataset.index) !== current) return;
          const next = (current + 1) % videos.length;
          goTo(next);
        });

        slide.appendChild(v);
        feed.appendChild(slide);
        videos.push(v);
      });
    }

    function goTo(index) {
      const target = videos[index];
      if (!target) return;
      target.parentElement.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function playOnly(index) {
      current = index;
      videos.forEach((v, i) => {
        if (i === index) {
          v.muted = !started;       // son actif dès que l'utilisateur a tapé
          const p = v.play();
          if (p) p.catch(() => {});
        } else {
          v.pause();
          v.currentTime = 0;
        }
      });
    }

    // Détecte la vidéo visible au centre de l'écran et la joue.
    function setupObserver() {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
            const idx = Number(entry.target.querySelector("video").dataset.index);
            if (idx !== current || videos[idx].paused) playOnly(idx);
          }
        });
      }, { threshold: [0.6] });

      document.querySelectorAll(".slide").forEach((s) => io.observe(s));
    }

    function start() {
      if (started) return;
      started = true;
      splash.classList.add("hide");
      playOnly(current);
    }

    splash.addEventListener("click", start);

    (async function init() {
      const list = await loadManifest();
      if (!list.length) {
        splash.style.display = "none";
        emptyMsg.style.display = "flex";
        return;
      }
      buildFeed(list);
      setupObserver();
      // Précharge/affiche la 1re image en mode muet en attendant le tap.
      playOnly(0);
      videos[0].pause();
    })();
  </script>
</body>
</html>
