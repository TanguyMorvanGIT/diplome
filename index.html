<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <title>Diplôme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #feed {
      position: fixed; inset: 0;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: contain;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #feed::-webkit-scrollbar { display: none; }
    .slide {
      position: relative;
      height: 100dvh; width: 100%;
      scroll-snap-align: start; scroll-snap-stop: always;
      background: #000;
      overflow: hidden;
    }
    @media all and (display-mode: standalone), all and (display-mode: fullscreen) {
      #feed, .slide { height: 100vh; }
    }
    .slide video, .slide .poster {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .slide video { z-index: 1; background: transparent; display: block; }
    /* Vraie vignette (1re image du fichier) AU-DESSUS de la vidéo tant qu'elle ne
       joue pas -> jamais de noir. Disparait pile quand la vidéo démarre. */
    .slide .poster {
      z-index: 2;
      background-position: center; background-size: cover; background-repeat: no-repeat;
      transition: opacity .2s ease;
    }
    .slide .poster.hidden { opacity: 0; }

    #splash {
      position: fixed; inset: 0; z-index: 50;
      background: #000; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      transition: opacity .4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .play {
      width: 84px; height: 84px;
      border: 2px solid rgba(255,255,255,.85); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite ease-in-out;
    }
    #splash .play::after {
      content: ""; width: 0; height: 0;
      border-left: 24px solid #fff;
      border-top: 15px solid transparent; border-bottom: 15px solid transparent;
      margin-left: 6px;
    }
    #splash p { font-size: 16px; opacity: .85; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.75} }
    #splash.loading .play, #splash.loading .ready-text { display: none; }
    #splash:not(.loading) .loadwrap { display: none; }
    .loadwrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #loadbar { width: 200px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.2); overflow: hidden; }
    #loadbar > i { display: block; height: 100%; width: 0%; background: #fff; transition: width .2s ease; }

    #empty {
      position: fixed; inset: 0; z-index: 40; color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; line-height: 1.5; opacity: .85;
    }
    /* TEMPORAIRE : bouton de mise à jour (force le rechargement sans cache) */
    #updateBtn {
      position: fixed; z-index: 60;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 50%; transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .2px;
      border: 1px solid rgba(255,255,255,.25); border-radius: 999px;
      cursor: pointer;
    }
    #updateBtn:active { background: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div id="feed"></div>
  <button id="updateBtn">↻ Mise à jour</button>

  <div id="splash" class="loading">
    <div class="play"></div>
    <p class="ready-text">Appuyer pour commencer</p>
    <div class="loadwrap">
      <div id="loadbar"><i></i></div>
      <p id="loadtext">Préparation… 0%</p>
    </div>
  </div>

  <div id="empty">Aucune vidéo trouvée dans <b>videos/</b>.</div>

  <script>
    const feed = document.getElementById("feed");
    const splash = document.getElementById("splash");
    const emptyMsg = document.getElementById("empty");
    const loadbar = document.querySelector("#loadbar > i");
    const loadtext = document.getElementById("loadtext");

    const WINDOW = 1;        // vidéos chargées de chaque côté (max 3 -> limite iPhone)
    let slides = [];         // { video, poster }
    let srcs = [];           // URL finale de chaque vidéo (blob si préchargée)
    let started = false;
    let ready = false;
    let current = 0;

    async function loadManifest() {
      try {
        const res = await fetch("videos.json", { cache: "no-store" });
        const list = await res.json();
        return Array.isArray(list) ? list : [];
      } catch (e) { return []; }
    }

    function posterUrl(src) {
      // videos/01_video.mp4 -> posters/01.jpg
      return src.replace("videos/", "posters/").replace(/_video\.mp4$/i, ".jpg");
    }

    function buildFeed(list) {
      list.forEach((src, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";

        const v = document.createElement("video");
        v.dataset.index = i;
        v.loop = true;
        v.muted = true; v.defaultMuted = true;
        v.playsInline = true;
        v.setAttribute("playsinline", "");
        v.setAttribute("webkit-playsinline", "");
        v.setAttribute("muted", "");
        v.preload = "none";

        const poster = document.createElement("div");
        poster.className = "poster";
        poster.style.backgroundImage = "url('" + posterUrl(src) + "')";

        // La vidéo joue -> on cache la vignette. Sinon la vignette reste -> jamais de noir.
        v.addEventListener("playing", () => poster.classList.add("hidden"));
        v.addEventListener("pause", () => poster.classList.remove("hidden"));
        v.addEventListener("waiting", () => poster.classList.remove("hidden"));

        slide.appendChild(v);
        slide.appendChild(poster);
        feed.appendChild(slide);
        slides.push({ video: v, poster: poster });
        srcs[i] = src;        // par défaut : URL réseau (sera remplacée par le blob)
      });
    }

    // Précharge en mémoire : vignettes (instantanées) + vidéos entières (lecture
    // 100% locale ensuite, aucun risque de coupure réseau pendant l'expo).
    async function preloadAll(list) {
      // vignettes d'abord (toutes petites)
      await Promise.all(list.map((src) => new Promise((res) => {
        const img = new Image(); img.onload = img.onerror = res; img.src = posterUrl(src);
      })));
      // puis les vidéos, une par une, avec progression
      for (let i = 0; i < list.length; i++) {
        try {
          const r = await fetch(list[i], { cache: "force-cache" });
          srcs[i] = URL.createObjectURL(await r.blob());
        } catch (e) { /* on garde l'URL réseau en repli */ }
        const pct = Math.round((i + 1) / list.length * 100);
        loadbar.style.width = pct + "%";
        loadtext.textContent = "Préparation… " + pct + "%";
      }
    }

    // Seules current ± WINDOW vidéos gardent leur source (limite iPhone respectée)
    function setWindow(index) {
      slides.forEach((s, i) => {
        const near = Math.abs(i - index) <= WINDOW;
        if (near && !s.video.src) {
          s.video.src = srcs[i];
          s.video.load();
        } else if (!near && s.video.src) {
          s.video.pause();
          s.video.removeAttribute("src");
          s.video.load();
          s.poster.classList.remove("hidden");
        }
      });
    }

    function playActive() {
      const v = slides[current].video;
      v.muted = !started;
      const p = v.play();
      if (p) p.catch(() => {});
    }

    function setActive(index) {
      if (index === current) return;
      const prev = slides[current].video;
      prev.pause();
      try { prev.currentTime = 0; } catch (e) {}
      slides[current].poster.classList.remove("hidden");

      current = index;
      setWindow(index);
      if (started) {
        const v = slides[index].video;
        if (v.readyState >= 2) playActive();
        else v.addEventListener("loadeddata", playActive, { once: true });
      }
    }

    function setupObserver() {
      const io = new IntersectionObserver((entries) => {
        let best = null;
        entries.forEach((e) => {
          if (e.isIntersecting && (!best || e.intersectionRatio > best.intersectionRatio)) best = e;
        });
        if (best && best.intersectionRatio >= 0.5) {
          setActive(Number(best.target.querySelector("video").dataset.index));
        }
      }, { threshold: [0.5, 0.9] });
      slides.forEach((s) => io.observe(s.video.parentElement));
    }

    function start() {
      if (started || !ready) return;
      started = true;
      splash.classList.add("hide");
      setWindow(current);
      const v = slides[current].video;
      if (v.readyState >= 2) playActive();
      else v.addEventListener("loadeddata", playActive, { once: true });
    }
    splash.addEventListener("click", start);
    splash.addEventListener("touchend", start, { passive: true });

    // TEMPORAIRE : force le rechargement de la dernière version (contourne le cache)
    document.getElementById("updateBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      if ("caches" in window) { caches.keys().then((k) => k.forEach((n) => caches.delete(n))); }
      location.replace(location.pathname + "?v=" + Date.now());
    });

    (async function init() {
      const list = await loadManifest();
      if (!list.length) { splash.style.display = "none"; emptyMsg.style.display = "flex"; return; }
      buildFeed(list);
      setupObserver();
      await preloadAll(list);
      setWindow(0);
      ready = true;
      splash.classList.remove("loading");
    })();
  </script>
</body>
</html>
