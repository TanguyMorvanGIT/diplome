<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <title>Diplôme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #feed {
      position: fixed; inset: 0;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: contain;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #feed::-webkit-scrollbar { display: none; }
    .slide {
      position: relative;
      height: 100dvh; width: 100%;
      scroll-snap-align: start; scroll-snap-stop: always;
      background: #000;
      overflow: hidden;
    }
    @media all and (display-mode: standalone), all and (display-mode: fullscreen) {
      #feed, .slide { height: 100vh; }
    }
    .slide video, .slide .poster {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .slide video { z-index: 1; background: transparent; display: block; }
    /* Vraie 1re image AU-DESSUS de la vidéo tant qu'elle n'affiche pas d'image.
       Disparition INSTANTANÉE pile quand la vidéo rend sa 1re image -> aucun noir. */
    .slide .poster {
      z-index: 2;
      background-position: center; background-size: cover; background-repeat: no-repeat;
    }
    .slide .poster.hidden { opacity: 0; }

    #splash {
      position: fixed; inset: 0; z-index: 50;
      background: #000; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      transition: opacity .4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .play {
      width: 84px; height: 84px;
      border: 2px solid rgba(255,255,255,.85); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite ease-in-out;
    }
    #splash .play::after {
      content: ""; width: 0; height: 0;
      border-left: 24px solid #fff;
      border-top: 15px solid transparent; border-bottom: 15px solid transparent;
      margin-left: 6px;
    }
    #splash p { font-size: 16px; opacity: .85; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.75} }
    #splash.loading .play, #splash.loading .ready-text { display: none; }
    #splash:not(.loading) .loadwrap { display: none; }
    .loadwrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #loadbar { width: 200px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.2); overflow: hidden; }
    #loadbar > i { display: block; height: 100%; width: 0%; background: #fff; transition: width .2s ease; }

    #empty {
      position: fixed; inset: 0; z-index: 40; color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; line-height: 1.5; opacity: .85;
    }
    /* TEMPORAIRE : bouton de mise à jour (force le rechargement sans cache) */
    #updateBtn {
      position: fixed; z-index: 60;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 50%; transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .2px;
      border: 1px solid rgba(255,255,255,.25); border-radius: 999px;
      cursor: pointer;
    }
    #updateBtn:active { background: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div id="feed"></div>
  <button id="updateBtn">↻ Mise à jour</button>

  <div id="splash" class="loading">
    <div class="play"></div>
    <p class="ready-text">Appuyer pour commencer</p>
    <div class="loadwrap">
      <div id="loadbar"><i></i></div>
      <p id="loadtext">Préparation… 0%</p>
    </div>
  </div>

  <div id="empty">Aucune vidéo trouvée dans <b>videos/</b>.</div>

  <script>
    const feed = document.getElementById("feed");
    const splash = document.getElementById("splash");
    const emptyMsg = document.getElementById("empty");
    const loadbar = document.querySelector("#loadbar > i");
    const loadtext = document.getElementById("loadtext");

    const WINDOW = 1;        // vidéos chargées de chaque côté (max 3 -> limite iPhone)
    let slides = [];         // vraies slides : { video, poster }
    let srcs = [];           // URL finale de chaque vidéo (blob si préchargée)
    let N = 0;
    let started = false;
    let ready = false;
    let current = 0;
    let teleporting = false;

    async function loadManifest() {
      try {
        const res = await fetch("videos.json", { cache: "no-store" });
        const list = await res.json();
        return Array.isArray(list) ? list : [];
      } catch (e) { return []; }
    }

    function posterUrl(src) {
      return src.replace("videos/", "posters/").replace(/_video\.mp4$/i, ".jpg");
    }

    function H() { return feed.clientHeight; }

    function makePoster(src) {
      const p = document.createElement("div");
      p.className = "poster";
      p.style.backgroundImage = "url('" + posterUrl(src) + "')";
      return p;
    }

    function buildFeed(list) {
      N = list.length;

      // Clone du HAUT = dernière vidéo (pour boucler vers le bas en remontant)
      const topClone = document.createElement("div");
      topClone.className = "slide";
      topClone.dataset.clone = "top";
      topClone.appendChild(makePoster(list[N - 1]));
      feed.appendChild(topClone);

      // Vraies slides
      list.forEach((src, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.dataset.index = i;

        const v = document.createElement("video");
        v.dataset.index = i;
        v.loop = true;
        v.muted = true; v.defaultMuted = true;
        v.playsInline = true;
        v.setAttribute("playsinline", "");
        v.setAttribute("webkit-playsinline", "");
        v.setAttribute("muted", "");
        v.preload = "none";

        const poster = makePoster(src);

        // Réaffiche la vignette dès que la vidéo n'a pas d'image stable
        // (pause, mise en mémoire tampon, ET la boucle qui repart -> 'seeking')
        const show = () => poster.classList.remove("hidden");
        v.addEventListener("pause", show);
        v.addEventListener("waiting", show);
        v.addEventListener("seeking", show);
        // Cache la vignette PILE quand une vraie image est rendue à l'écran
        if ("requestVideoFrameCallback" in HTMLVideoElement.prototype) {
          const onFrame = () => { if (!v.paused) poster.classList.add("hidden"); v.requestVideoFrameCallback(onFrame); };
          v.requestVideoFrameCallback(onFrame);
        } else {
          v.addEventListener("timeupdate", () => { if (!v.paused && v.currentTime > 0.02) poster.classList.add("hidden"); });
        }

        slide.appendChild(v);
        slide.appendChild(poster);
        feed.appendChild(slide);
        slides.push({ video: v, poster: poster });
        srcs[i] = src;
      });

      // Clone du BAS = première vidéo (pour boucler 8 -> 1)
      const botClone = document.createElement("div");
      botClone.className = "slide";
      botClone.dataset.clone = "bottom";
      botClone.appendChild(makePoster(list[0]));
      feed.appendChild(botClone);
    }

    async function preloadAll(list) {
      await Promise.all(list.map((src) => new Promise((res) => {
        const img = new Image(); img.onload = img.onerror = res; img.src = posterUrl(src);
      })));
      for (let i = 0; i < list.length; i++) {
        try {
          const r = await fetch(list[i], { cache: "force-cache" });
          srcs[i] = URL.createObjectURL(await r.blob());
        } catch (e) {}
        const pct = Math.round((i + 1) / list.length * 100);
        loadbar.style.width = pct + "%";
        loadtext.textContent = "Préparation… " + pct + "%";
      }
    }

    // Pré-décode la 1re image (lecture muette puis pause) -> démarrage instantané,
    // même pour les grosses vidéos (7 et 8).
    function prime(v) {
      if (v._primed || !v.src) return;
      v._primed = true;
      const run = () => {
        v.muted = true;
        const p = v.play();
        if (p) p.then(() => { if (!(started && v === slides[current].video)) v.pause(); }).catch(() => {});
      };
      if (v.readyState >= 2) run();
      else v.addEventListener("loadeddata", run, { once: true });
    }

    function setWindow(index) {
      slides.forEach((s, i) => {
        const near = Math.abs(i - index) <= WINDOW;
        if (near) {
          if (!s.video.src) { s.video.preload = "auto"; s.video.src = srcs[i]; s.video.load(); }
          prime(s.video);
        } else if (s.video.src) {
          s.video.pause();
          s.video.removeAttribute("src");
          s.video.load();
          s.video._primed = false;
          s.poster.classList.remove("hidden");
        }
      });
    }

    function playActive() {
      const v = slides[current].video;
      v.muted = !started;
      const p = v.play();
      if (p) p.catch(() => {});
    }

    function setActive(index) {
      if (index === current) { if (started && slides[index].video.paused) playActive(); return; }
      const prev = slides[current].video;
      prev.pause();
      try { prev.currentTime = 0; } catch (e) {}
      slides[current].poster.classList.remove("hidden");

      current = index;
      setWindow(index);
      if (started) {
        const v = slides[index].video;
        if (v.readyState >= 2) playActive();
        else v.addEventListener("loadeddata", playActive, { once: true });
      }
    }

    // Téléport instantané pour la boucle infinie (les clones sont identiques aux
    // vignettes des vraies vidéos -> le saut est invisible).
    function goToReal(index) {
      teleporting = true;
      feed.scrollTop = (index + 1) * H();   // +1 car le clone du haut occupe la position 0
      setActive(index);
      requestAnimationFrame(() => { teleporting = false; });
    }

    function setupObserver() {
      const io = new IntersectionObserver((entries) => {
        if (teleporting) return;
        let best = null;
        entries.forEach((e) => {
          if (e.isIntersecting && (!best || e.intersectionRatio > best.intersectionRatio)) best = e;
        });
        if (!best) return;
        const t = best.target;
        if (t.dataset.clone === "bottom" && best.intersectionRatio >= 0.9) { goToReal(0); return; }
        if (t.dataset.clone === "top" && best.intersectionRatio >= 0.9) { goToReal(N - 1); return; }
        if (t.dataset.index !== undefined && best.intersectionRatio >= 0.5) {
          setActive(Number(t.dataset.index));
        }
      }, { threshold: [0.5, 0.9, 0.99] });
      document.querySelectorAll(".slide").forEach((s) => io.observe(s));
    }

    function start() {
      if (started || !ready) return;
      started = true;
      splash.classList.add("hide");
      setWindow(current);
      const v = slides[current].video;
      if (v.readyState >= 2) playActive();
      else v.addEventListener("loadeddata", playActive, { once: true });
    }
    splash.addEventListener("click", start);
    splash.addEventListener("touchend", start, { passive: true });

    document.getElementById("updateBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      if ("caches" in window) { caches.keys().then((k) => k.forEach((n) => caches.delete(n))); }
      location.replace(location.pathname + "?v=" + Date.now());
    });

    (async function init() {
      const list = await loadManifest();
      if (!list.length) { splash.style.display = "none"; emptyMsg.style.display = "flex"; return; }
      buildFeed(list);
      // place le scroll sur la 1re vraie vidéo (après le clone du haut)
      requestAnimationFrame(() => { feed.scrollTop = H(); });
      setupObserver();
      await preloadAll(list);
      setWindow(0);
      ready = true;
      splash.classList.remove("loading");
    })();
  </script>
</body>
</html>
